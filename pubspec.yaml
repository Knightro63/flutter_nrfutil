name: nrfutil
description: A Flutter plugin to create nRF DFU packages with signing for DFU updates on nRF51 and nRF52 devices.
version: 0.0.5
repository: https://github.com/Knightro63/flutter_nrfutil

environment:
  sdk: ">=2.17.6 <4.0.0"
  flutter: ">=1.20.0"

dependencies:
  flutter:
    sdk: flutter
  archive: ^4.0.7
  protobuf: ^5.0.0
  basic_utils: ^5.8.2
  crypto: ^3.0.6
  yaml: ^3.1.3
  args: ^2.7.0
  logger: ^2.6.2
  checked_yaml: ^2.0.4
  json_annotation: ^4.9.0
  path: ^1.9.1
  bisection: ^0.4.3+1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.3

false_secrets:
 - /lib/signing.dart
 - /example/assets/key.pem
 - /example/assets/pbkey.pem
 - /example/assets/pbkey.c
